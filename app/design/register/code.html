<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#2b8cee",
              "background-light": "#f6f7f8",
              "background-dark": "#101922",
            },
            fontFamily: {
              "display": ["Plus Jakarta Sans"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<title>TKU Zen Club Sign Up</title>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    
        .glass-effect {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 transition-colors duration-300">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden max-w-[480px] mx-auto shadow-2xl">
<!-- Hero Section: Blue Sky & White Clouds Theme (Full Top) -->
<div class="@container">
<div class="w-full bg-center bg-no-repeat bg-cover flex flex-col justify-end overflow-hidden min-h-[240px] relative shadow-lg" data-alt="Serene blue sky with soft white clouds" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDgikn6xndc6b81auSFUuHvXMxgVFzpZbjSBYb3vJeufHCcJJr6LwMi-N3ecO0zG7kVwdP6-PVDClIlHPVG6-O8QVCvp-vdXMOICqJWwfRnNneu6nNeHMTlR19yucoqXullhXJ07qvYjYxISAk4_nYAhG1wZtdVbiqG_yDA4ErihwyqBAYIcBjq3pnUbxovStiHkNuSeNPoFt3HGuKZitv_U3ooygHK6EKVcw_YT8KHAM2aFfCLgp3VN7bBRWRl917yYzsgu65hwMo");'>
<!-- Overlay for text readability -->
<div class="absolute inset-0 bg-gradient-to-t from-white/60 to-transparent"></div>
<!-- Floating Back Button -->
<div class="absolute top-4 left-4 z-20">
<button class="flex items-center justify-center size-12 rounded-full glass-effect text-white">
<span class="material-symbols-outlined text-2xl">chevron_left</span>
</button>
</div>
<!-- Top Logo (Sized to match back arrow size-12) -->
<div class="absolute top-4 left-1/2 -translate-x-1/2 z-20">
<div class="size-12 rounded-full flex items-center justify-center relative overflow-hidden bg-[#D15151]" style="box-shadow: 0 0 15px rgba(255, 255, 255, 0.8);">
<div class="size-8 rounded-full flex items-center justify-center bg-[#FBC02D]">
<div class="size-4 rounded-full bg-[#4CAF50]"></div>
</div>
</div>
</div>
<div class="relative p-6">
<h2 class="text-slate-900 text-2xl font-bold leading-tight tracking-tight">TKU Zen Club</h2>
<p class="text-slate-700 text-sm font-medium">Join our peaceful community</p>
</div>
</div>
</div>
<!-- Header Text -->
<div class="px-6 pt-6 pb-2">
<h2 class="text-slate-900 dark:text-slate-100 text-3xl font-bold leading-tight">Create Account</h2>
<p class="text-slate-500 dark:text-slate-400 text-base font-normal mt-1">Start your journey to inner peace and mindfulness.</p>
</div>
<!-- Registration Form -->
<div class="flex flex-col gap-4 px-6 py-4">
<!-- Full Name -->
<label class="flex flex-col gap-2">
<span class="text-slate-700 dark:text-slate-300 text-sm font-semibold ml-1">Full Name</span>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">person</span>
<input class="form-input block w-full pl-12 pr-4 py-4 rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-900 dark:text-white placeholder:text-slate-400 focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all outline-none" placeholder="Enter your full name" type="text"/>
</div>
</label>
<!-- Student ID -->
<label class="flex flex-col gap-2">
<span class="text-slate-700 dark:text-slate-300 text-sm font-semibold ml-1">Student ID</span>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">badge</span>
<input class="form-input block w-full pl-12 pr-4 py-4 rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-900 dark:text-white placeholder:text-slate-400 focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all outline-none" placeholder="e.g. 410012345" type="text"/>
</div>
</label>
<!-- Email -->
<label class="flex flex-col gap-2">
<span class="text-slate-700 dark:text-slate-300 text-sm font-semibold ml-1">Email</span>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">mail</span>
<input class="form-input block w-full pl-12 pr-4 py-4 rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-900 dark:text-white placeholder:text-slate-400 focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all outline-none" placeholder="name@email.com" type="email"/>
</div>
</label>
<!-- Password -->
<label class="flex flex-col gap-2">
<span class="text-slate-700 dark:text-slate-300 text-sm font-semibold ml-1">Password</span>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">lock</span>
<input class="form-input block w-full pl-12 pr-12 py-4 rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-900 dark:text-white placeholder:text-slate-400 focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all outline-none" placeholder="Create a password" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 cursor-pointer">visibility</span>
</div>
</label>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-4 px-6 py-6 mb-10">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98]">
            Register
        </button>
<div class="flex items-center justify-center gap-2 mt-2">
<p class="text-slate-500 dark:text-slate-400 text-sm">Already have an account?</p>
<a class="text-primary font-semibold text-sm hover:underline" href="#">Back to Login</a>
</div>
</div>
<!-- Footer Spacer for Mobile View -->
<div class="h-6 bg-transparent"></div>
</div>
</body></html>
