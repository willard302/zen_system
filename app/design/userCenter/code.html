<!DOCTYPE html>

<html class="light" lang="zh-Hant"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TKU Zen Club - 個人資料</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0ea5e9", // Sky Blue
                        "background-light": "#f0f9ff", // Lightest Blue
                        "background-dark": "#0c4a6e", // Deep Blue
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Public Sans', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .sky-gradient {
            background: linear-gradient(180deg, #38bdf8 0%, #0ea5e9 100%);
        }
    
        :root {
            --logo-red: #EF4444;
            --logo-yellow: #FBBF24;
            --logo-green: #22C55E;
        }
        .zen-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 32px;
            height: 32px;
        }
        .circle {
            position: absolute;
            border-radius: 50%;
        }
        .circle-1 { width: 100%; height: 100%; background-color: var(--logo-red); z-index: 1; }
        .circle-2 { width: 66.67%; height: 66.67%; background-color: var(--logo-yellow); z-index: 2; }
        .circle-3 { width: 33.33%; height: 33.33%; background-color: var(--logo-green); z-index: 3; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Header Section -->
<header class="sky-gradient pt-6 pb-20 px-4 relative overflow-hidden">
<!-- Abstract Cloud Pattern -->
<div class="absolute top-0 right-0 w-64 h-64 bg-white/20 rounded-full blur-3xl -mr-20 -mt-20"></div>
<div class="absolute bottom-0 left-0 w-48 h-48 bg-white/10 rounded-full blur-2xl -ml-10 -mb-10"></div>
<div class="relative z-10 flex items-center justify-between">
<button class="p-2 text-white">
<span class="material-symbols-outlined text-3xl">menu</span>
</button>
<h1 class="text-white text-xl font-bold tracking-tight">個人資料</h1>
<div class="flex items-center gap-2">
<!-- TKU Zen Club Logo (Three-color filled concentric circles) -->
<div class="zen-logo">
<div class="circle circle-1"></div>
<div class="circle circle-2"></div>
<div class="circle circle-3"></div>
</div>
</div>
</div>
</header>
<!-- Main Content -->
<main class="flex-1 -mt-14 px-4 pb-24 relative z-20">
<!-- Profile Info Card -->
<div class="bg-white dark:bg-slate-800 rounded-3xl shadow-xl p-6 flex flex-col items-center text-center">
<!-- Profile Image with Cloud Border -->
<div class="relative -mt-20 mb-4 p-2 bg-white dark:bg-slate-800 rounded-full shadow-lg">
<div class="w-32 h-32 rounded-full border-4 border-dashed border-primary/30 p-1">
<div class="w-full h-full rounded-full bg-cover bg-center" data-alt="Professional headshot of a young male student" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCPTwNfZkkvdSNnk4ggyWDVBsgX2YyHOr7gZn1yeVJhBSbDBO-_Ov-Qotvm9w1XQIxy0-ZBlAO73mbDWsnYwBHv7LiygGiTz42BeNKRymX74nsMo6w5SnEf_fNrsWfRC01U2yzyxH3YZHHB1QgwAzkBQRVmmemS9D6xIrR_xtzyELSYIkvpFLfp8wGQ-jDnbQz0QTGOYR7BVMLOlrEaagVU2j7xZVMDxHiBX7ZpnjsrR-HGtqi2gyljt5me9yiOnh6fDiVAU8Wal54')">
</div>
</div>
</div>
<div class="mb-4">
<h2 class="text-2xl font-bold text-slate-900 dark:text-white">陳大文</h2>
<div class="flex items-center justify-center gap-2 mt-1">
<span class="bg-primary/10 text-primary text-sm font-semibold px-3 py-1 rounded-full border border-primary/20">
                        核心成員
                    </span>
<span class="bg-amber-100 text-amber-700 text-sm font-semibold px-3 py-1 rounded-full border border-amber-200">
                        財務長
                    </span>
</div>
</div>
<div class="w-full grid grid-cols-2 gap-4 border-t border-slate-100 dark:border-slate-700 pt-4">
<div class="text-left">
<p class="text-xs text-slate-500 dark:text-slate-400 uppercase tracking-wider">學系</p>
<p class="font-semibold text-slate-800 dark:text-slate-200">資訊工程學系</p>
</div>
<div class="text-right">
<p class="text-xs text-slate-500 dark:text-slate-400 uppercase tracking-wider">學號</p>
<p class="font-semibold text-slate-800 dark:text-slate-200">410012345</p>
</div>
</div>
</div>
<!-- Stats Section -->
<div class="grid grid-cols-2 gap-4 mt-6">
<div class="glass-card rounded-2xl p-4 flex flex-col items-center text-center shadow-sm">
<span class="material-symbols-outlined text-primary mb-2">avg_time</span>
<p class="text-xs text-slate-600 dark:text-slate-300">總禪定時數</p>
<p class="text-xl font-bold text-primary">42.5h</p>
</div>
<div class="glass-card rounded-2xl p-4 flex flex-col items-center text-center shadow-sm">
<span class="material-symbols-outlined text-primary mb-2">calendar_month</span>
<p class="text-xs text-slate-600 dark:text-slate-300">本月打卡</p>
<p class="text-xl font-bold text-primary">12次</p>
</div>
</div>
<!-- Action Items List -->
<div class="mt-8 space-y-3">
<h3 class="px-2 text-sm font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest">帳戶設定</h3>
<div class="bg-white/80 dark:bg-slate-800/80 rounded-2xl overflow-hidden shadow-sm">
<a class="flex items-center justify-between p-4 hover:bg-primary/5 transition-colors border-b border-slate-50 dark:border-slate-700" href="#">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-400">person_edit</span>
<span class="font-medium">編輯個人資料</span>
</div>
<span class="material-symbols-outlined text-slate-300">chevron_right</span>
</a>
<a class="flex items-center justify-between p-4 hover:bg-primary/5 transition-colors border-b border-slate-50 dark:border-slate-700" href="#">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-400">lock_reset</span>
<span class="font-medium">修改密碼</span>
</div>
<span class="material-symbols-outlined text-slate-300">chevron_right</span>
</a>
<a class="flex items-center justify-between p-4 hover:bg-primary/5 transition-colors border-b border-slate-50 dark:border-slate-700" href="#">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-400">security</span>
<span class="font-medium">隱私權設定</span>
</div>
<span class="material-symbols-outlined text-slate-300">chevron_right</span>
</a>
<a class="flex items-center justify-between p-4 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors" href="#">
<div class="flex items-center gap-3 text-red-500">
<span class="material-symbols-outlined">logout</span>
<span class="font-bold">登出</span>
</div>
</a>
</div>
</div>
</main>
<!-- Bottom Nav Bar -->
<nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 px-6 py-3 z-50">
<div class="max-w-md mx-auto flex justify-between items-center">
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-medium">首頁</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">menu_book</span>
<span class="text-[10px] font-medium">帳簿</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">calendar_today</span>
<span class="text-[10px] font-medium">行事曆</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined fill-1">account_circle</span>
<span class="text-[10px] font-bold">個人</span>
</a>
</div>
</nav>
<!-- Style for filling the icon -->
<style>
        .fill-1 {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    
        :root {
            --logo-red: #EF4444;
            --logo-yellow: #FBBF24;
            --logo-green: #22C55E;
        }
        .zen-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 32px;
            height: 32px;
        }
        .circle {
            position: absolute;
            border-radius: 50%;
        }
        .circle-1 { width: 100%; height: 100%; background-color: var(--logo-red); z-index: 1; }
        .circle-2 { width: 66.67%; height: 66.67%; background-color: var(--logo-yellow); z-index: 2; }
        .circle-3 { width: 33.33%; height: 33.33%; background-color: var(--logo-green); z-index: 3; }
    </style>
</body></html>
