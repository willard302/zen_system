<body class="min-h-screen celestial-bg relative flex flex-col items-center justify-center p-6" data-alt="expansive view of bright blue sky with ethereal white clouds at noon providing a sense of weightless serenity">
<!-- Top Navigation Placeholder (TopAppBar logic suppressed for transactional screen but manual back button added) -->
<nav class="fixed top-0 left-0 w-full z-50 flex items-center justify-between px-6 py-8">
<button aria-label="Go back" class="w-12 h-12 flex items-center justify-center rounded-full bg-white/90 text-primary-fixed-dim shadow-lg active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[24px]" data-icon="arrow_back">arrow_back</span>
</button>
</nav>
<!-- Main Content Canvas -->
<main class="w-full max-w-md flex flex-col items-center space-y-8 mt-12">
<!-- Logo Section -->
<div class="flex flex-col items-center space-y-4">
<div class="relative">
<!-- Tricolor Circle Logo -->
<div class="w-24 h-24 rounded-full tricolor-logo shadow-[0_0_40px_10px_rgba(255,255,255,0.6)] border-4 border-white/20"></div>
<!-- Ambient Glow behind logo -->
<div class="absolute inset-0 w-24 h-24 rounded-full bg-white/20 blur-2xl -z-10"></div>
</div>
<h1 class="text-[30px] font-extrabold tracking-widest text-white drop-shadow-md font-headline">
                忘記密碼
            </h1>
<p class="text-white/80 text-center font-body px-4 tracking-wide leading-relaxed">
                淡江大學禪學社 - TKU Zen Club<br/>
                請輸入您的電子郵件以重設密碼
            </p>
</div>
<!-- Forgot Password Form -->
<div class="w-full glass-panel bg-white/10 rounded-lg p-8 space-y-8 border border-white/20">
<!-- Email Input Field -->
<div class="space-y-2">
<label class="block text-[12px] font-bold tracking-widest text-white uppercase ml-1">
                    Email
                </label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-white/70" data-icon="mail">mail</span>
<input class="w-full h-14 bg-white/10 border-none rounded-full px-12 text-white placeholder:text-white/40 focus:ring-2 focus:ring-white/30 glass-panel font-body transition-all" placeholder="yourname@example.com" required="" type="email"/>
</div>
</div>
<!-- Submit Button -->
<button class="w-full h-16 bg-primary text-white font-bold text-[18px] tracking-wide rounded-full shadow-[0_0_20px_rgba(43,157,238,0.4)] hover:shadow-[0_0_30px_rgba(43,157,238,0.6)] active:scale-[0.98] transition-all flex items-center justify-center">
                發送驗證碼
            </button>
<!-- Secondary Action -->
<div class="flex justify-center">
<a class="text-white/70 hover:text-white text-[14px] font-medium tracking-wide transition-colors flex items-center gap-2" href="#">
<span class="material-symbols-outlined text-[18px]" data-icon="support_agent">support_agent</span>
                    聯繫社團管理員
                </a>
</div>
</div>

<span class="material-symbols-outlined text-white text-[32px]" data-icon="cloud">cloud</span>
